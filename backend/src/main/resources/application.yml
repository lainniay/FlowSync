spring:
  application:
    name: FlowSync
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      connection-init-sql: "SET time_zone = '+08:00'"
  flyway:
    enabled: true
    validate-migration-naming: true

server:
  port: 8080

flowsync:
  http:
    max-json-body-bytes: 1048576

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
